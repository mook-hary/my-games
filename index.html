<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>えげブロ</title>
    <link rel="stylesheet" href="style.css?v=704">
</head>
<body>

    <div id="game-screen-wrapper">
        
        <div id="game-body-box">
            
            <div id="start-overlay">
                <div class="start-card">
                    <h1>えげブロ</h1>
                    <p>同じ数字のブロックを線で結んで消そう！<br>2面以上が開いているブロックが選択できます。</p>
                    <button id="actual-start-btn">ゲームスタート</button>
                </div>
            </div>

            <div id="game-container">
                <div id="ui-panel">
                    <h2>SCORE</h2>
                    <div id="score-display"><span id="score">0</span> pt</div>
                    
                    <div id="status-box">
                        <div id="status">1つ目のブロックを選んでください</div>
                    </div>
                    
                    <div>残りブロック: <span id="count">0</span></div>
                    
                    <div id="timer-text">残り時間: 120 秒</div>
                    <div id="timer-container">
                        <div id="timer-bar"></div>
                    </div>
                    
                    <div id="control-panel">
                        <button id="rot-z-btn" class="rot-btn">左右回転<br>(水平)</button>
                        <button id="rot-y-btn" class="rot-btn">上下回転<br>(垂直)</button>
                    </div>
                    
                    <button id="reset-btn">リセット</button>
                </div>

                <div id="stage-area">
                    <div id="viewport">
                        <div id="stage"></div>
                    </div>
                </div>
            </div>

        </div> </div> <script src="script.js?v=704"></script>
</body>
</html>
