<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CUBE dev</title>
    <link rel="stylesheet" href="style.css?v=20260613-05">
</head>
<body>

    <div id="game-screen-wrapper">
        
        <div id="game-body-box">
            
            <div id="start-overlay">
                <div class="start-card">
                    <h1>CUBE dev</h1>
                    <p>同じ柄のブロックをペアで選んで消そう！<br>2面以上が開いているブロックが選択できます。</p>
                    
                    <button id="diff-tutorial-btn" class="tutorial-btn">
                        Tutorial
                    </button>
                    <div class="difficulty-container">
                        <span class="diff-label">LEVEL</span>
                        <div class="diff-switch">
                            <button id="diff-normal-btn" class="diff-btn active">Normal</button>
                            <button id="diff-hard-btn" class="diff-btn">Hard</button>
                        </div>
                    </div>

                    <button id="actual-start-btn">START</button>
                </div>
            </div>

            <div id="pause-overlay">
                <div class="pause-card">
                    <h2>PAUSE</h2>
                    <p>ゲームは一時停止中です</p>
                    <div class="pause-buttons">
                        <button id="resume-btn">CONTINUE</button>
                        <button id="to-title-btn">🏠 TITLE</button>
                    </div>
                </div>
            </div>

            <div id="timeup-overlay">
                <div class="timeup-card">
                    <h2>TIME UP</h2>
                    <p>おつかれさまでした</p>
            
                    <div class="result-score">
                        <span class="score-label">SCORE</span>
                        <span class="score-value" id="timeup-score">0</span>
                        <span class="score-unit">pt</span>
                    </div>
            
                    <div class="timeup-buttons">
                        <button id="timeup-retry-btn">CONTINUE</button>
                        <button id="timeup-title-btn">🏠 TITLE</button>
                        <button id="timeup-share-btn" class="result-share-btn">SHARE</button>
                    </div>
                    
                    
                    
                </div>
            </div>

            <div id="clear-overlay">
                <div class="clear-card">
                    <h2>CLEAR!</h2>
                    <p>全ブロック消去達成！</p>
            
                    <div class="result-score">
                        <span class="score-label">SCORE</span>
                        <span class="score-value" id="clear-score">0</span>
                        <span class="score-unit">pt</span>
                    </div>
            
                    <div id="clear-bonus-area" class="clear-bonus">                                           
                        TIME BONUS:
                        <span id="clear-time-bonus">0</span><br>
                    
                        CLEAR BONUS:
                        <span id="clear-clear-bonus">0</span>
                    </div>
                    
                    <div id="clear-rank" class="clear-rank">★★★</div>
                    <div id="clear-new-record"></div>
            
                    <div class="clear-buttons">
                        <button id="clear-retry-btn">CONTINUE</button>
                        <button id="clear-title-btn">🏠 TITLE</button>
                        <button id="clear-share-btn" class="result-share-btn">SHARE</button>
                    </div>                  
                    
                </div>
            </div>
            
            <div id="game-container">
                
                <div id="utility-buttons">
                    <button id="sound-toggle-btn" class="utility-btn" aria-label="サウンド切り替え">🔊</button>
                    
                </div>
                
                <div id="ui-panel">
                    <div class="score-area">
                        <h2>SCORE</h2>
                        <div id="score-display"><span id="score">0</span> pt</div>
                        <div id="best-display">BEST: <span id="best-score">0</span></div>
                    </div>
                    
                    <div id="status-box">
                        <div id="status">1つ目のブロックを選んでください</div>
                    </div>
                    
                    <div>残り<span id="count">0</span></div>
                    
                    <div id="timer-text">残り時間 120 秒</div>
                    <div id="timer-container">
                        <div id="timer-bar"></div>
                    </div>
                    
                    <div id="button-grid">
                        <button id="pause-btn">PAUSE</button>
                        <button id="rot-z-btn" class="rot-btn">⇨</button>
                    
                        <button id="reset-btn">RESET</button>
                        <button id="rot-y-btn" class="rot-btn">⇩</button>
                    </div>
                </div>

                <div id="stage-area">
                    <div id="viewport">
                        <div id="stage"></div>
                    </div>
                </div>
                <div id="screen-fade"></div>
            </div>

        </div> </div> <script src="script.js?v=20260613-17"></script>
</body>
</html>
